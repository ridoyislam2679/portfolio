    <script>
        // DOM Elements
        const profileImage = document.getElementById('profileImage');
        const editImageBtn = document.getElementById('editImageBtn');
        const profileImageInput = document.getElementById('profileImageInput');
        const fullnameInput = document.getElementById('fullname');
        const updateNameBtn = document.getElementById('updateNameBtn');
        const currentPasswordInput = document.getElementById('currentPassword');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const updatePasswordBtn = document.getElementById('updatePasswordBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const passwordHint = document.getElementById('passwordHint');
        
        // Profile Image Change
        editImageBtn.addEventListener('click', function() {
            profileImageInput.click();
        });
        
        profileImageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    profileImage.innerHTML = `<img src="${event.target.result}" alt="Profile">`;
                    showToast('প্রোফাইল ছবি পরিবর্তন হয়েছে!', 'success');
                    // Save to localStorage
                    localStorage.setItem('profileImage', event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Load saved profile image from localStorage
        const savedImage = localStorage.getItem('profileImage');
        if (savedImage) {
            profileImage.innerHTML = `<img src="${savedImage}" alt="Profile">`;
        }
        
        // Load saved name from localStorage
        const savedName = localStorage.getItem('fullname');
        if (savedName) {
            fullnameInput.value = savedName;
        }
        
        // Update Name
        updateNameBtn.addEventListener('click', function() {
            const newName = fullnameInput.value.trim();
            
            if (!newName) {
                showToast('দয়া করে আপনার নাম লিখুন!', 'error');
                return;
            }
            
            if (newName.length < 3) {
                showToast('নাম কমপক্ষে ৩ অক্ষরের হতে হবে!', 'error');
                return;
            }
            
            // Save to localStorage
            localStorage.setItem('fullname', newName);
            showToast('নাম সফলভাবে পরিবর্তন হয়েছে!', 'success');
        });
        
        // Password Strength Checker
        newPasswordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = '';
            let color = '';
            
            if (password.length === 0) {
                passwordHint.innerHTML = '';
                return;
            }
            
            if (password.length < 6) {
                strength = 'দুর্বল (কমপক্ষে ৬ অক্ষর)';
                color = '#ff6b6b';
            } else if (password.length >= 6 && password.length < 8) {
                strength = 'মাঝারি (আরও শক্তিশালী করুন)';
                color = '#FFD700';
            } else if (password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
                strength = 'শক্তিশালী';
                color = '#6bff8b';
            } else if (password.length >= 8) {
                strength = 'ভাল (বড় হাতের অক্ষর ও সংখ্যা যোগ করুন)';
                color = '#FFD700';
            } else {
                strength = 'দুর্বল';
                color = '#ff6b6b';
            }
            
            passwordHint.innerHTML = `<i class="fas fa-shield-alt"></i> পাসওয়ার্ড শক্তি: <span style="color: ${color};">${strength}</span>`;
        });
        
        // Update Password
        updatePasswordBtn.addEventListener('click', function() {
            const currentPassword = currentPasswordInput.value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!currentPassword) {
                showToast('দয়া করে বর্তমান পাসওয়ার্ড লিখুন!', 'error');
                return;
            }
            
            if (!newPassword) {
                showToast('দয়া করে নতুন পাসওয়ার্ড লিখুন!', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showToast('নতুন পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('নতুন পাসওয়ার্ড মিলছে না!', 'error');
                return;
            }
            
            // Check if current password matches saved password (demo)
            const savedPassword = localStorage.getItem('password');
            if (savedPassword && savedPassword !== currentPassword) {
                showToast('বর্তমান পাসওয়ার্ড ভুল!', 'error');
                return;
            }
            
            // Save new password to localStorage
            localStorage.setItem('password', newPassword);
            
            // Clear fields
            currentPasswordInput.value = '';
            newPasswordInput.value = '';
            confirmPasswordInput.value = '';
            passwordHint.innerHTML = '';
            
            showToast('পাসওয়ার্ড সফলভাবে পরিবর্তন হয়েছে!', 'success');
        });
        
        // Logout
        logoutBtn.addEventListener('click', function() {
            if (confirm('আপনি কি লগআউট করতে চান?')) {
                // Clear session storage
                localStorage.removeItem('isLoggedIn');
                showToast('লগআউট হচ্ছে...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            }
        });
        
        // Toast Message Function
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            if (type === 'error') {
                toast.classList.add('error');
            }
            toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
        
        // Initialize demo data
        if (!localStorage.getItem('password')) {
            localStorage.setItem('password', '123456');
        }
        
        // Check if user is logged in (demo)
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        if (!isLoggedIn && window.location.pathname.includes('settings.html')) {
            // Just for demo, don't redirect automatically
            console.log('Demo mode - settings page accessible');
        }
    </script>
