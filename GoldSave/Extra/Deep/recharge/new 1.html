    <script>
        // PHP data passed to JavaScript for calculations only
        const USER_COINS = 110;
        
        // Generate CSRF token
        function generateCSRFToken() {
            return Math.random().toString(36).substring(2) + Date.now().toString(36);
        }
        document.getElementById('csrfToken').value = generateCSRFToken();
        
        // DOM Elements
        const rechargeAmountInput = document.getElementById('rechargeAmount');
        const coinsToSpendSpan = document.getElementById('coinsToSpend');
        const remainingCoinsSpan = document.getElementById('remainingCoins');
        const mobileNumberInput = document.getElementById('mobileNumber');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('formMessage');
        
        // Calculate function
        function calculateRecharge() {
            let amount = parseFloat(rechargeAmountInput.value);
            const userCoins = USER_COINS;
            
            if (isNaN(amount) || amount <= 0) {
                coinsToSpendSpan.innerHTML = '০ কয়েন';
                remainingCoinsSpan.innerHTML = `${userCoins.toFixed(2)} কয়েন`;
                return;
            }
            
            // 1 Coin = 1 TK, so coins needed = amount
            const coinsNeeded = amount;
            const remaining = userCoins - coinsNeeded;
            
            coinsToSpendSpan.innerHTML = `${coinsNeeded.toFixed(2)} কয়েন`;
            
            if (remaining < 0) {
                remainingCoinsSpan.innerHTML = `<span style="color: #ff6b6b;">০ কয়েন (অপর্যাপ্ত)</span>`;
            } else {
                remainingCoinsSpan.innerHTML = `${remaining.toFixed(2)} কয়েন`;
            }
            
            // Validation
            if (amount < 10) {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.6';
            } else if (amount > userCoins) {
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.6';
            } else {
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                messageDiv.style.display = 'none';
            }
        }
        
        function showMessage(message, type) {
            messageDiv.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            messageDiv.className = `form-message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                if (messageDiv.style.display === 'block') {
                    messageDiv.style.display = 'none';
                }
            }, 5000);
        }
        
        // Event listeners
        rechargeAmountInput.addEventListener('input', calculateRecharge);
        
        // Mobile number validation (only numbers)
        mobileNumberInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 11);
        });
        
        // Preset buttons
        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const amount = this.getAttribute('data-amount');
                rechargeAmountInput.value = amount;
                calculateRecharge();
                if (parseFloat(amount) <= USER_COINS && parseFloat(amount) >= 10) {
                    messageDiv.style.display = 'none';
                }
            });
        });
        
        // Form submission
        const rechargeForm = document.getElementById('rechargeForm');
        
        rechargeForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const mobile = mobileNumberInput.value.trim();
            const amount = parseFloat(rechargeAmountInput.value);
            const userCoins = USER_COINS;
            
            // Validation
            if (!mobile) {
                showMessage('দয়া করে মোবাইল নম্বর লিখুন', 'error');
                return;
            }
            
            if (mobile.length !== 11) {
                showMessage('দয়া করে সঠিক ১১ ডিজিটের মোবাইল নম্বর লিখুন', 'error');
                return;
            }
            
            if (isNaN(amount) || amount <= 0) {
                showMessage('দয়া করে রিচার্জের পরিমাণ লিখুন', 'error');
                return;
            }
            
            if (amount < 10) {
                showMessage('সর্বনিম্ন রিচার্জ পরিমাণ ৳ ১০', 'error');
                return;
            }
            
            if (amount > userCoins) {
                showMessage(`অপর্যাপ্ত কয়েন! আপনার কাছে ${userCoins.toFixed(2)} কয়েন আছে`, 'error');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> প্রসেসিং...';
            
            // Update CSRF token
            document.getElementById('csrfToken').value = generateCSRFToken();
            
            // Submit to PHP
            // this.submit(); // Uncomment in production
            
            // Demo simulation (remove in production)
            setTimeout(() => {
                showMessage(`সফলভাবে ৳ ${amount} রিচার্জ হয়েছে! ${mobile} নম্বরে ${amount} টাকা যোগ হয়েছে।`, 'success');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> রিচার্জ করুন';
                rechargeAmountInput.value = '';
                mobileNumberInput.value = '';
                calculateRecharge();
                
                setTimeout(() => {
                    // window.location.href = 'dashboard.php';
                }, 2000);
            }, 1500);
        });
        
        // Initialize
        calculateRecharge();
    </script>
