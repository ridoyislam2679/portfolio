<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Login - Gold Save World</title>
    
    <!-- Bootstrap 5 CSS (optional, for some components) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Common CSS -->
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/login.css">
    
</head>
<body>
    <div class="main-content">
        <!-- Header - Same as home page -->
        <div class="top-actions">
            <div class="logo-area">
                <a href="home.html" style="text-decoration: none;">
                    <span class="logo">
                        <i class="fas fa-coins"></i> Gold Kinen
                    </span>
                </a>
            </div>
            <div class="btn-group-top">
                <a href="login.html" class="btn-top btn-login-top">
                    <i class="fas fa-sign-in-alt"></i> LOGIN
                </a>
                <a href="register.html" class="btn-top btn-register-top">
                    <i class="fas fa-user-plus"></i> REGISTER
                </a>
            </div>
        </div>
		
		<div class="image-container">
			<image src="Image/login-Image.png" align="center">
		</div>
        
        <!-- Login Form -->
        <div class="form-container">
            <!-- Image above form -->
            <div class="form-image">
                <div class="form-image-icon">
                    <image src="Image/user.png" class="login-image">
                </div>
            </div>
            
            <h2 class="form-title">Verifaction Your Account</h2>
            
            <!-- Error message container (for PHP integration) -->
            <div id="errorMessage" class="error-message"></div>
            
            <!-- Success message container -->
            <div id="successMessage" class="success-message"></div>
            
            <!-- Login Form - PHP Ready -->
            <form id="loginForm" method="POST" action="login.php" autocomplete="off">
                <div class="form-group">
                    <label for="mobile">
                        <i class="fas fa-phone-alt"></i> Mobile Number
                    </label>
                    <div class="phone-input">
                        <input type="number" 
                               name="otp" 
                               id="mobile" 
                               class="form-control phone-number" 
                               placeholder="5698"
                               maxlength="6"
                               pattern="[0-9]{10}"
                               title="Please enter 6 digit OTP number"
                               autocomplete="off"
                               required>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Verify
                </button>
            </form>
        </div>
        
        <!-- Hidden input for CSRF token (for PHP security) -->
        <input type="hidden" id="csrf_token" value="">
    </div>
    
    <!-- Bootstrap JS (minimal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
