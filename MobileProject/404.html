<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পৃষ্ঠা পাওয়া যায়নি - 404 ত্রুটি</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts - বাংলা ফন্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            color: #fff;
        }
        .error-container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            margin-bottom: 0;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
            line-height: 1;
        }
        .error-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .error-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .search-box {
            max-width: 500px;
            margin: 0 auto 30px;
        }
        .btn-custom {
            background: linear-gradient(to right, #ff8a00, #da1b60);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .animation-container {
            margin: 30px 0;
        }
        .lost-illustration {
            max-width: 300px;
            margin: 0 auto;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
        }
        .helpful-links {
            margin-top: 30px;
        }
        .helpful-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s ease;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.5);
        }
        .helpful-links a:hover {
            color: #ffd700;
            border-bottom: 1px solid #ffd700;
        }
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }
            .error-title {
                font-size: 2rem;
            }
            .error-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-container">
            <div class="animation-container">
                <svg class="lost-illustration" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="#fff" stroke-width="2"/>
                    <circle cx="70" cy="80" r="10" fill="#fff"/>
                    <circle cx="130" cy="80" r="10" fill="#fff"/>
                    <path d="M60 120 Q100 150 140 120" stroke="#fff" stroke-width="3" fill="none"/>
                    <path d="M50 50 L30 30 M150 50 L170 30 M50 150 L30 170 M150 150 L170 170" stroke="#fff" stroke-width="2"/>
                </svg>
            </div>
            
            <h1 class="error-code">404</h1>
            <h2 class="error-title">পৃষ্ঠাটি পাওয়া যায়নি!</h2>
            <p class="error-message">
                দুঃখিত, আপনি যে পৃষ্ঠাটি খুঁজছেন সেটি মুছে ফেলা হয়েছে, নাম পরিবর্তন করা হয়েছে বা সাময়িকভাবে অনুপলব্ধ।
            </p>
            
            <div class="action-buttons">
                <a href="https://mobilereviewbd.com/" class="btn btn-custom me-3">হোমপেজে ফিরে যান</a>
                <a href="https://mobilereviewbd.com/contact/" class="btn btn-outline-light">আমাদের সাথে যোগাযোগ করুন</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
